services:
  - type: web
    name: seointel-audit-worker
    runtime: node
    plan: free
    buildCommand: npm ci --legacy-peer-deps
    startCommand: npm run worker:audit
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUDIT_WORKER_ID
        value: worker-production-1
      - key: AUDIT_POLL_INTERVAL_MS
        value: "4000"
      - key: WORKER_HEALTH_PORT
        sync: false
      - key: WORKER_RUNTIME
        value: render-web-service
      - key: DEEP_AUDIT_ENABLED
        value: "false"
      - key: BLOG_AUTOMATION_ENABLED
        value: "false"
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_API_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_BLOG_MODEL
        value: qwen/qwen3.5-122b-a10b
      - key: NVIDIA_BLOG_ENABLED
        value: "false"
      - key: BLOG_FIXTURE_PROVIDER_ENABLED
        value: "false"
      - key: ALLOW_BLOG_FIXTURE_GENERATION
        value: "false"
      - key: BLOG_FIXTURE_STAGING_ONLY
        value: "false"
      - key: ALLOW_PRODUCTION_BLOG_FIXTURE_GENERATION
        value: "false"
